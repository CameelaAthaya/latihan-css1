<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lesson 9 : Cameela</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="exercise-section">
    <div class="row align-center">
      <div class="col">
        <span class="label">9a</span>
        <div class="red-square"></div>
      </div>
      <div class="col">
        <span class="label">9b</span>
        <div class="green-circle"></div>
      </div>
    </div>
  </div>

  <div class="exercise-section">
    <h3>9c</h3>
    <div class="survey-box">
      <p class="survey-text">Satisfied with our service?</p>
      <button class="survey-btn">Yes</button>
      <button class="survey-btn">No</button>
    </div>
  </div>

  <div class="exercise-section">
    <h3>9d</h3>
    <div class="yt-banner">
      <p class="yt-title">Install YouTube Music</p>
      <p class="yt-desc">Add YouTube Music to your desktop for quick and easy access</p>
    </div>
  </div>

  <div class="exercise-section">
    <h3>9e</h3>
    <div class="twitter-shadow-wrap">
      <div class="twitter-box">
        <img src="ryujin.jpg" alt="Avatar" class="twitter-avatar">
        <input type="text" class="twitter-input" placeholder="What's happening?">
        <button class="twitter-btn">Tweet</button>
      </div>
    </div>
  </div>

  <div class="exercise-section">
    <h3>9f & 9g</h3>
    <div class="cards-container">
      <div class="friend-card">
        <img src="ryujin.jpg" alt="Oliver" class="friend-img">
        <div class="friend-info">
          <p class="friend-name">Ryujin</p>
          <p class="friend-status">10 mutual friends</p>
          <button class="add-friend-btn">Add Friend</button>
        </div>
      </div>
      <div class="friend-card">
        <img src="felix.jpg" alt="Mimi" class="friend-img">
        <div class="friend-info">
          <p class="friend-name">Felix</p>
          <p class="friend-status">8 mutual friends</p>
          <button class="add-friend-btn">Add Friend</button>
        </div>
      </div>
      <div class="friend-card">
        <img src="jake.jpg" alt="Rex" class="friend-img">
        <div class="friend-info">
          <p class="friend-name">Jake</p>
          <p class="friend-status">12 mutual friends</p>
          <button class="add-friend-btn">Add Friend</button>
        </div>
      </div>
    </div>
  </div>

  <div class="exercise-section">
    <h3>9h</h3>
    <div class="google-container">
      <div class="google-row">
        <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png" alt="Google Logo" class="google-logo">
      </div>
      <div class="google-row">
        <input type="text" class="google-search-input" placeholder="Search Google or type a URL">
      </div>
      <div class="google-row">
        <button class="google-btn">Google Search</button>
        <button class="google-btn">I'm Feeling Lucky</button>
      </div>
    </div>
  </div>

</body>
</html>
