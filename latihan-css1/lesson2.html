<head>
  <title>Amazon Design Exercise</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .back-link {
      color: rgb(0, 113, 133);
      text-decoration: underline;
      display: block;
      margin-bottom: 8px;
    }

    .product-title {
      font-size: 24px;
      font-weight: bold;
      margin-top: 0;
      margin-bottom: 5px;
    }

    .product-price {
      color: rgb(0, 118, 0);
      font-weight: bold;
      margin-bottom: 8px;
    }

    .delivery-info {
      margin-bottom: 15px;
    }

    button {
      border: none;
      height: 36px;
      padding-left: 15px;
      padding-right: 15px;
      border-radius: 18px;
      cursor: pointer;
      margin-right: 8px;
      font-weight: 500;
    }

    .add-to-cart {
      background-color: rgb(255, 216, 20);
    }

    .buy-now {
      background-color: rgb(255, 164, 28);
    }
  </style>
</head>
<body>

  <a href="#" class="back-link">Back to Amazon</a>

  <p class="product-title">Nike Black Running Shoes</p>
