<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lesson 8 : Cameela</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="exercise-container">
    <h3>8a</h3>
    <div class="box-8a">
      <input type="text" class="input-block" placeholder="Name">
      <input type="text" class="input-block" placeholder="Email">
    </div>
  </div>

  <div class="exercise-container">
    <h3>8b</h3>
    <div class="box-8b">
      <p class="inline-text">Thanks for chatting with our customer support. Would you like to take our quick survey?</p>
      <button class="inline-btn">Yes</button>
      <button class="inline-btn">No</button>
    </div>
  </div>

  <div class="exercise-container">
    <h3>8c</h3>
    <div class="box-8c">
      <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png" alt="Google Logo" class="google-logo">
      <input type="text" class="search-shadow" placeholder="Search Google or type a URL">
    </div>
  </div>

  <div class="row">
    <div class="col">
      <h3>8d</h3>
      <div class="signup-box">
        <div class="name-row">
          <input type="text" class="input-field header-name" placeholder="First name">
          <input type="text" class="input-field header-name" placeholder="Last name">
        </div>
        <input type="text" class="input-field email-field" placeholder="Email">
        <button class="signup-btn">Sign Up</button>
      </div>
    </div>

    <div class="col">
      <h3>8e</h3>
      <div class="uber-box">
        <h2>Request a ride now</h2>
        <input type="text" class="uber-input" placeholder="Enter pickup location">
        <input type="text" class="uber-input" placeholder="Enter destination">
        <div class="btn-group">
          <button class="uber-btn-now">Request now</button>
          <button class="uber-btn-later">Schedule for later</button>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
