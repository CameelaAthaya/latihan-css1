<html lang="en">
<head>
  <title>Lesson 3 - Hovers & Transitions</title>
  <style>
    body {
      font-family: Arial;
      padding-bottom: 200px;
    }

    button {
      cursor: pointer;
      transition: all 0.15s;
      margin-right: 15px;
      border: none;
    }

    .uber-button {
      background-color: black;
      color: white;
      height: 40px;
      width: 120px;
    }
    .uber-button:hover {
      opacity: 0.8; 
    }
    
    .amazon-button {
      background-color: rgb(255, 216, 20);
      height: 36px;
      width: 160px;
      border-radius: 18px;
    }
    .amazon-button:hover {
      background-color: rgb(245, 205, 3); 
    }

    .github-button {
      background-color: rgb(46, 164, 79);
      color: white;
      font-weight: bold;
      height: 40px;
      width: 100px;
      border-radius: 6px;
    }
    .github-button:hover {
      box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.15); 
    }

    .bootstrap-get-started {
      background-color: rgb(121, 82, 179);
      color: white;
      font-weight: bold;
      height: 40px;
      width: 120px;
      border-radius: 4px;
    }
    .bootstrap-get-started:hover {
      background-color: rgb(100, 60, 160);
    }

    .bootstrap-download {
      background-color: white;
      color: rgb(108, 117, 125);
      border: 1px solid rgb(108, 117, 125);
      font-weight: bold;
      height: 40px;
      width: 120px;
      border-radius: 4px;
    }
    .bootstrap-download:hover {
      background-color: rgb(108, 117, 125);
      color: white;
    }

    .linkedin-apply {
      background-color: rgb(10, 102, 194);
      color: white;
      font-weight: bold;
      height: 36px;
      width: 220px;
      border-radius: 18px;
    }
    .linkedin-apply:hover {
      background-color: rgb(5, 75, 145);
    }

    .linkedin-save {
      background-color: white;
      color: rgb(10, 102, 194);
      border: 1px solid rgb(10, 102, 194);
      font-weight: bold;
      height: 36px;
      width: 80px;
      border-radius: 18px;
    }
    .linkedin-save:hover {
      background-color: rgb(220, 235, 250);
      border-width: 2px; 
    }
  </style>
</head>
<body>

  <h3>Soal 3a</h3>
  <button class="uber-button">Request now</button>

  <h3>Soal 3b</h3>
  <button class="amazon-button">Add to Cart</button>

  <h3>Soal 3c</h3>
  <button class="github-button">Sign up</button>

  <h3>Soal 3d</h3>
  <button class="bootstrap-get-started">Get started</button>
  <button class="bootstrap-download">Download</button>

  <h3>Soal 3e</h3>
  <button class="linkedin-apply">Apply on company website</button>
  <button class="linkedin-save">Save</button>

</body>
</html>
