<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lesson 14 Exercises - Position Fixed</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="fb-header">
    <div class="fb-left">
      <img src="ryujin.jpg" alt="Profile" class="fb-avatar">
      <span class="fb-name">Ryujin</span>
    </div>
    <div class="fb-right">
      <button class="fb-btn-blue">Add Friend</button>
      <button class="fb-btn-gray">Message</button>
    </div>
  </div>

  <div class="discord-server-sidebar">
    <img src="jake.jpg" alt="Server 1" class="discord-icon">
    <img src="felix.jpg" alt="Server 2" class="discord-icon">
    <img src="karina.jpg" alt="Server 3" class="discord-icon">
  </div>

  <div class="discord-channel-sidebar">
    <div class="channel-header">
      <span>INFO</span>
      <span class="plus-sign">+</span>
    </div>
    <div class="channel-list">
      <div class="channel-item"># new-videos</div>
      <div class="channel-item"># updates</div>
      <div class="channel-item"># faq</div>
    </div>
  </div>

  <div class="main-container">
    <div class="exercise-section">
      <h2>Lesson 14</h2>
    </div>

    <div class="exercise-section" style="margin-top: 400px;">
      <h3>14b</h3>
    </div>

    <div class="exercise-section" style="margin-top: 500px;">
      <h3>Menuju Akhir Halaman...</h3>
    </div>
  </div>

  <div class="right-sidebar-green">
    right sidebar
  </div>

  <div class="bottom-right-box">
    bottom-right
  </div>

  <div class="modal-overlay">
    <div class="modal-card">
      <h3 class="modal-title">Modal Title</h3>
      <p class="modal-text">This is a modal</p>
      <button class="modal-close-btn" onclick="document.querySelector('.modal-overlay').style.display='none'">Close</button>
    </div>
  </div>

</body>
</html>
