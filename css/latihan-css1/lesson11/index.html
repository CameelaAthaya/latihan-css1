<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lesson 11 Exercises : Cameela</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="exercise-section">
    <h3>11a</h3>
    <div class="grid-11a">
      <div class="col-blue">200px</div>
      <div class="col-pink">75px</div>
    </div>
  </div>

  <div class="exercise-section">
    <h3>11b</h3>
    <div class="grid-11b">
      <div class="col-blue">col1</div>
      <div class="col-pink">col2</div>
      <div class="col-blue">col3</div>
    </div>
  </div>

  <div class="exercise-section">
    <h3>11c</h3>
    <div class="grid-11c">
      <div class="col-pink">col1</div>
      <div class="col-pink">col2</div>
      <div class="col-pink">col3</div>
      <div class="col-pink">col4</div>
      <div class="col-pink">col1</div>
      <div class="col-pink">col2</div>
      <div class="col-pink">col3</div>
      <div class="col-pink">col4</div>
    </div>
  </div>

  <div class="exercise-section">
    <h3>11d</h3>
    <div class="grid-11d">
      <div class="friend-card">
        <img src="ryujin.jpg" alt="Ryujin" class="card-img">
        <div class="card-info">
          <p class="friend-name">Ryujin</p>
          <div class="mutual-row">
            <img src="jake.jpg" alt="Mutual" class="mutual-avatar">
            <p class="mutual-text">2 mutual friends</p>
          </div>
          <button class="add-btn">Add Friend</button>
        </div>
      </div>
      <div class="friend-card">
        <img src="jake.jpg" alt="Jake" class="card-img">
        <div class="card-info">
          <p class="friend-name">Jake</p>
          <div class="mutual-row">
            <img src="felix.jpg" alt="Mutual" class="mutual-avatar">
            <p class="mutual-text">3 mutual friends</p>
          </div>
          <button class="add-btn">Add Friend</button>
        </div>
      </div>
      <div class="friend-card">
        <img src="felix.jpg" alt="Felix" class="card-img">
        <div class="card-info">
          <p class="friend-name">Felix</p>
          <div class="mutual-row">
            <img src="ryujin.jpg" alt="Mutual" class="mutual-avatar">
            <p class="mutual-text">4 mutual friends</p>
          </div>
          <button class="add-btn">Add Friend</button>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
